<!-- ═══════════════════════════════════════════════════════════════
   UGOKU AI 本体LP 用｜FDE（年収5000万円の新職種って何？）誘導バナー
   .ugkfde-banner で名前空間を切ってあるので、既存CSSと干渉しません。
   リンク先：…/ugoku-ai-lp/fde-guide/
   ★貼る場所：一番最後の記事バナー（OpenAI Codex編）の直後、<footer> の前。
   ═══════════════════════════════════════════════════════════════ -->
<div class="ugkfde-banner">
  <style>
    .ugkfde-banner{
      --p:#2E2815; --pd:#201B0E; --p2:#443A1F; --e:#EAA800; --l:#F7F3E8; --m:#C8BEA0;
      max-width:960px; margin:48px auto; padding:0 20px;
      font-family:"Noto Sans JP",system-ui,sans-serif; box-sizing:border-box;
    }
    .ugkfde-banner *{box-sizing:border-box;}
    .ugkfde-card{
      display:grid; grid-template-columns:1.15fr 1fr; align-items:stretch;
      border-radius:22px; overflow:hidden; color:var(--l); text-decoration:none;
      background:
        radial-gradient(120% 140% at 90% -20%, rgba(224,145,42,.30), transparent 55%),
        linear-gradient(155deg,var(--p2),var(--pd));
      box-shadow:0 18px 40px rgba(20,40,32,.20);
    }
    .ugkfde-l{padding:34px 32px;}
    .ugkfde-eb{
      display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:800;
      letter-spacing:.12em; color:var(--e); border:1px solid rgba(224,145,42,.5);
      padding:5px 12px; border-radius:100px; margin-bottom:16px;
    }
    .ugkfde-l h3{
      font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; font-weight:900;
      font-size:clamp(20px,3.4vw,27px); line-height:1.5; margin:0 0 12px;
    }
    .ugkfde-l h3 .hl{color:var(--pd); background:var(--e); padding:0 6px; border-radius:5px;
      box-decoration-break:clone; -webkit-box-decoration-break:clone;}
    .ugkfde-l p{font-size:14px; color:var(--m); margin:0 0 22px; line-height:1.8;}
    .ugkfde-btn{
      display:inline-flex; align-items:center; gap:9px; text-decoration:none;
      background:var(--e); color:var(--pd); font-weight:900; font-size:15px;
      padding:14px 24px; border-radius:12px; box-shadow:0 6px 16px rgba(224,145,42,.35);
      transition:.16s; font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    }
    .ugkfde-btn:hover{transform:translateY(-2px); filter:brightness(1.05);}
    .ugkfde-r{position:relative; min-height:210px; background:var(--pd);
      display:flex; align-items:center; justify-content:center; overflow:hidden;}
    .ugkfde-thumb{text-align:center; padding:24px;}
    .ugkfde-thumb .k{font-size:12px; font-weight:800; letter-spacing:.1em; color:var(--e); margin-bottom:10px;}
    .ugkfde-thumb .big{
      font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; font-weight:900;
      font-size:clamp(26px,4.4vw,40px); line-height:1.2; color:var(--l);
    }
    .ugkfde-thumb .big b{color:var(--e);}
    .ugkfde-thumb .chips{margin-top:14px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
    .ugkfde-thumb .chip{font-size:11px; font-weight:700; background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.2); border-radius:100px; padding:4px 11px;}
    @media(max-width:640px){
      .ugkfde-card{grid-template-columns:1fr;}
      .ugkfde-r{min-height:150px; order:-1;}
    }
  </style>

  <a class="ugkfde-card" href="https://gesunokiwamiii.github.io/ugoku-ai-lp/fde-guide/" style="text-decoration:none;">
    <div class="ugkfde-l">
      <span class="ugkfde-eb">🚀 無料ガイド ｜ TECH TREND解説</span>
      <h3>年収<span class="hl">5000万円</span>の新職種<br>「FDE」って、何者？</h3>
      <p>いま世界のAI業界でいちばん奪い合いになっている新職種FDEを、テック初心者にもやさしく。年収の実態・求人800%増の理由から、その考え方を自分の仕事と遊びに活かす方法まで、うごく君が解説します。</p>
      <span class="ugkfde-btn">記事を読む →</span>
    </div>
    <div class="ugkfde-r">
      <div class="ugkfde-thumb">
        <div class="k">TECH TREND</div>
        <div class="big">新職種<br><b>FDE</b>とは？</div>
        <div class="chips">
          <span class="chip">年収5000万</span>
          <span class="chip">求人800%増</span>
          <span class="chip">Palantir</span>
          <span class="chip">OpenAI</span>
        </div>
      </div>
    </div>
  </a>
</div>
<!-- ═══ バナーここまで（FDE 年収5000万円の新職種） ═══ -->
